<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>
Event Registration System
</title>



<style>

body{

font-family:Arial;
background:#f5f5f5;
margin:0;
padding:0;

}

.container{

width:600px;
margin:40px auto;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);

}

h2{

text-align:center;

}

input{

width:100%;
padding:10px;
margin:5px 0;
border:1px solid #ccc;
border-radius:4px;

}

button{

padding:10px 15px;
margin:10px 5px;
border:none;
background:#2c7be5;
color:white;
border-radius:4px;
cursor:pointer;

}

button:disabled{

background:#aaa;

}

.suggestions{

border:1px solid #ccc;
max-height:150px;
overflow-y:auto;
background:white;

}

.suggestionItem{

padding:8px;
cursor:pointer;

}

.suggestionItem:hover{

background:#f0f0f0;

}

.profileTable{

width:100%;

}

.profileTable td{

padding:6px;

}

</style>



</head>



<body>



<div class="container">



<h2>
Event Registration
</h2>



<input

id="searchBox"

type="text"

placeholder="Type your name"

autocomplete="off"

>



<div

id="suggestions"

class="suggestions">

</div>



<br>



<div id="result">

</div>



</div>



<script src="./js/config.js"></script>

<script src="./js/app.js"></script>



</body>

</html>
